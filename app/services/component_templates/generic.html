<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: #e0e0e0; padding: 24px; min-height: 100vh;
  }
  .container { max-width: 800px; margin: 0 auto; }
  .card {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(100,100,255,0.2);
    border-radius: 16px; padding: 24px; margin-bottom: 16px;
    backdrop-filter: blur(10px);
  }
  h1 { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: #fff; }
  .section { margin-bottom: 16px; }
  .section-title { font-size: 14px; color: #5b9bd5; font-weight: 600; margin-bottom: 8px; }
  .kv-row {
    display: flex; justify-content: space-between; padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .kv-key { color: #999; font-size: 13px; }
  .kv-value { font-size: 13px; font-weight: 500; }
  .list-item {
    padding: 8px 12px; margin: 4px 0; background: rgba(255,255,255,0.04);
    border-radius: 6px; font-size: 13px;
  }
  pre {
    background: rgba(0,0,0,0.3); border-radius: 8px; padding: 16px;
    font-size: 12px; overflow-x: auto; color: #b0c4de;
  }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>{{TITLE}}</h1>
    <div id="content"></div>
  </div>
</div>
<script>
const DATA = {{DATA_JSON}};

function renderValue(val, depth) {
  if (depth > 3) return `<pre>${JSON.stringify(val, null, 2)}</pre>`;

  if (val === null || val === undefined) return '<span style="color:#666">-</span>';
  if (typeof val === 'boolean') return val ? '✅' : '❌';
  if (typeof val === 'number') return val.toLocaleString();
  if (typeof val === 'string') return val;

  if (Array.isArray(val)) {
    if (val.length === 0) return '<span style="color:#666">空列表</span>';
    if (typeof val[0] === 'object') {
      // 表格模式
      const cols = Object.keys(val[0]);
      let html = '<div style="overflow-x:auto;margin:8px 0"><table style="width:100%;border-collapse:collapse;font-size:12px">';
      html += '<tr>' + cols.map(c => `<th style="padding:6px 10px;text-align:left;background:rgba(91,155,213,0.15);color:#b0c4de">${c}</th>`).join('') + '</tr>';
      val.slice(0, 20).forEach(row => {
        html += '<tr>' + cols.map(c => `<td style="padding:6px 10px;border-bottom:1px solid rgba(255,255,255,0.05)">${renderValue(row[c], depth+1)}</td>`).join('') + '</tr>';
      });
      html += '</table></div>';
      if (val.length > 20) html += `<div style="color:#666;font-size:12px">...共 ${val.length} 条</div>`;
      return html;
    }
    return val.map(v => `<div class="list-item">${renderValue(v, depth+1)}</div>`).join('');
  }

  if (typeof val === 'object') {
    let html = '<div class="section">';
    for (const [k, v] of Object.entries(val)) {
      if (typeof v === 'object' && v !== null && !Array.isArray(v)) {
        html += `<div class="section-title">${k}</div>${renderValue(v, depth+1)}`;
      } else {
        html += `<div class="kv-row"><span class="kv-key">${k}</span><span class="kv-value">${renderValue(v, depth+1)}</span></div>`;
      }
    }
    html += '</div>';
    return html;
  }

  return String(val);
}

document.getElementById('content').innerHTML = renderValue(DATA, 0);
</script>
</body>
</html>
