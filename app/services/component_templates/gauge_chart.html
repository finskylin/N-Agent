<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; }
  #chart { width: 100%; height: 100vh; }
</style>
</head>
<body>
<div id="chart"></div>
<script>
const DATA = {{DATA_JSON}};
const chart = echarts.init(document.getElementById('chart'), 'dark');

const value = DATA.value || DATA.score || DATA.current_value || 50;
const max = DATA.max || 100;
const min = DATA.min || 0;
const label = DATA.label || DATA.name || '';
const level = DATA.level || DATA.conclusion || '';

// 颜色映射
function getColor(val, maxVal) {
  const ratio = val / maxVal;
  if (ratio >= 0.8) return '#26a69a';
  if (ratio >= 0.6) return '#5b9bd5';
  if (ratio >= 0.4) return '#ffa726';
  return '#ef5350';
}

const option = {
  backgroundColor: '#1a1a2e',
  title: { text: '{{TITLE}}', left: 'center', top: 10, textStyle: { color: '#e0e0e0', fontSize: 16 } },
  series: [{
    type: 'gauge',
    center: ['50%', '55%'],
    radius: '75%',
    min: min,
    max: max,
    startAngle: 210,
    endAngle: -30,
    progress: { show: true, width: 18 },
    itemStyle: { color: getColor(value, max) },
    pointer: { show: true, length: '60%', width: 6 },
    axisLine: { lineStyle: { width: 18, color: [[1, 'rgba(255,255,255,0.1)']] } },
    axisTick: { show: true, splitNumber: 2, lineStyle: { color: 'rgba(255,255,255,0.3)' } },
    splitLine: { length: 12, lineStyle: { color: 'rgba(255,255,255,0.4)', width: 2 } },
    axisLabel: { distance: 25, color: '#999', fontSize: 12 },
    detail: {
      valueAnimation: true,
      formatter: function(v) { return v.toFixed(1) + (level ? '\n' + level : ''); },
      color: '#e0e0e0',
      fontSize: 28,
      offsetCenter: [0, '30%']
    },
    data: [{ value: value, name: label }],
    title: { offsetCenter: [0, '60%'], color: '#999', fontSize: 14 }
  }]
};

chart.setOption(option);
window.addEventListener('resize', () => chart.resize());
</script>
</body>
</html>
